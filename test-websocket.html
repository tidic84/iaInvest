<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .message {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-left: 3px solid #007bff;
        }
    </style>
</head>
<body>
    <h1>Trading AI - WebSocket Test</h1>

    <div id="status" class="status info">Initializing...</div>

    <div>
        <button onclick="testAPI()">Test API HTTP</button>
        <button onclick="testWebSocket()">Test WebSocket</button>
        <button onclick="clearMessages()">Clear</button>
    </div>

    <h2>Messages:</h2>
    <div id="messages"></div>

    <script>
        const WS_URL = 'ws://87.106.118.194:8000/ws';
        const API_URL = 'http://87.106.118.194:8000/api';

        let ws = null;

        function log(msg, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${msg}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            console.log(msg);
        }

        function setStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
        }

        async function testAPI() {
            log('Testing API HTTP...');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log(`✅ API Response: ${JSON.stringify(data)}`, 'success');
                setStatus('API is working!', 'success');

                // Test trading status
                const statusResponse = await fetch(`${API_URL}/trading/status`);
                const statusData = await statusResponse.json();
                log(`✅ Trading Status: ${JSON.stringify(statusData)}`, 'success');
            } catch (error) {
                log(`❌ API Error: ${error.message}`, 'error');
                setStatus('API Error: ' + error.message, 'error');
            }
        }

        function testWebSocket() {
            log('Testing WebSocket connection...');

            if (ws) {
                ws.close();
            }

            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    log('✅ WebSocket CONNECTED!', 'success');
                    setStatus('WebSocket connected successfully!', 'success');
                };

                ws.onmessage = (event) => {
                    log(`📨 Message received: ${event.data}`);
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket Error: ${error}`, 'error');
                    setStatus('WebSocket Error', 'error');
                };

                ws.onclose = (event) => {
                    log(`🔌 WebSocket closed. Code: ${event.code}, Reason: ${event.reason || 'N/A'}`);
                    if (!event.wasClean) {
                        setStatus('WebSocket connection failed', 'error');
                    }
                };
            } catch (error) {
                log(`❌ Exception: ${error.message}`, 'error');
                setStatus('Exception: ' + error.message, 'error');
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        // Auto-test on load
        window.onload = () => {
            log('Page loaded. Click buttons to test.');
            setStatus('Ready to test', 'info');
        };
    </script>
</body>
</html>
